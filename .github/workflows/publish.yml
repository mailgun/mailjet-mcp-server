name: Run Publish

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    # Required to mint the OIDC token for NPM Trusted Publishing
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Display tag to be published and ensure it is bumped in package.json
        id: verify_bump
        run: |
          # Read the name and version directly from package.json
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          
          echo "Target Package: $PACKAGE_NAME"
          echo "Target Version: $PACKAGE_VERSION"

          # Query NPM to see if this exact version is already published.
          # We use '2>/dev/null' to suppress the error if the package has NEVER been published before (404).
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version 2>/dev/null || echo "")

          # Check if NPM returned the exact version
          if [ "$PUBLISHED_VERSION" == "$PACKAGE_VERSION" ]; then
            echo "❌ ERROR: Version $PACKAGE_VERSION of $PACKAGE_NAME is already published on npm!"
            echo "You must bump the version in package.json before releasing."
            exit 1 # Failing this step safely stops the entire job
          else
            echo "✅ Version $PACKAGE_VERSION is completely new. Ready for release!"
          fi

      - name: Determine npm Distribution Tag and publish
        # Protection to explicitly relies on the manual button trigger, skipping when testing on branch
        if: ${{ success() && github.event_name == 'workflow_dispatch' }}
        id: determine_tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Processing release tag: $PACKAGE_VERSION"

          # Determine the distribution tag using regexp
          if [[ "$PACKAGE_VERSION" =~ -(beta|alpha|rc) ]]; then
            # Extract the actual keyword without the leading hyphen (e.g., "beta" instead of "-beta")
            NPM_DIST_TAG="${BASH_REMATCH[1]}"
          else
            NPM_DIST_TAG="latest"
          fi

          echo "Publishing tag-> $NPM_DIST_TAG"
          npm publish --access public --provenance --tag "$NPM_DIST_TAG"
