name: Run Publish

on:
  release:
    types:
      - created

# Required to mint the OIDC token for NPM Trusted Publishing
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run package publishing on NPM
        # --provenance is needed for OIDC handshakes while using NPM Trusted Publishing
        run: npm publish --access public --provenance
