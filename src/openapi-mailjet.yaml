openapi: '3.1.0'
info:
  title: Mailjet API
  description: A complete collection of all publicly available endpoints and methods for the Mailjet API
  version: '1.0.0'
servers:
- url: https://api.mailjet.com
  description: US Mailjet
- url: https://api.eu.mailjet.com
  description: EU Mailjet
paths:
  /v3/REST/activitycounters:
    get:
      tags:
      - Statistics
      description: Read-only metrics system tracking user activities and system events as time-series data
      operationId: get_v3_rest_activitycounters
      parameters:
      - name: APIKeyID
        in: query
        schema:
          type: string
        description: null
      - name: CounterType
        in: query
        schema:
          type: string
        description: Counter type to retrieve. (e.g. 'WSL', 'WSH', 'WSD', 'WSM', 'WOL', 'WOH', 'WOD', 'WOM', 'WLL', 'WLH', 'WLD', 'WLM', 'DUL', 'AAL', 'AAM', 'AAD', AUL', 'AUM', 'AUD', 'BCL', 'BOL', 'LVL', 'LVH', 'LVD', 'LVM', 'LCL', 'LCH', 'LCD', 'LCM')
      - name: FromTS
        in: query
        schema:
          type: string
        description: Retrieve statistics later than this timestamp
      - name: IdentityID
        in: query
        schema:
          type: string
        description: null
      - name: SourceID2
        in: query
        schema:
          type: string
        description: null
      - name: SourceIDs
        in: query
        schema:
          type: array
          items:
            type: string
        description: null
      - name: ToTS
        in: query
        schema:
          type: string
        description: Retrieve statistics before or equal to this timestamp
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Count:
                    type: integer
                    description: Number of items in this response
                  Data:
                    type: array
                    items:
                      type: object
                      properties:
                        APIKeyID:
                          type: integer
                        ContactCount:
                          type: integer
                        ContactCount2:
                          type: integer
                        EventCount:
                          type: integer
                        EventCount2:
                          type: integer
                        SourceID:
                          type: integer
                        SourceID2:
                          type: integer
                        Timeslice:
                          type: string
                      title: activitycounters
                  Total:
                    type: integer
                    description: Total number of items available
        '400':
          description: Bad Request - Invalid syntax or parameters
        '401':
          description: Unauthorized - API key is missing or invalid
        '403':
          description: Forbidden - Insufficient permissions
        '404':
          description: activitycounters not found
        '429':
          description: Too Many Requests - API rate limit exceeded
        '500':
          description: Internal Server Error
      security:
      - basicAuth: []
  /v3/REST/aggregategraphstatistics:
    get:
      tags:
      - Statistics
      description: Aggregated campaign statistics grouped over intervals.
      operationId: get_v3_rest_aggregategraphstatistics
      parameters:
      - name: CampaignAggregateID
        in: query
        schema:
          type: string
        description: Only show statistics for this aggregattion
      - name: Range
        in: query
        schema:
          type: string
        description: The period of the aggregates (24 hours or 7 days)
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Count:
                    type: integer
                    description: Number of items in this response
                  Data:
                    type: array
                    items:
                      type: object
                      properties:
                        BlockedCount:
                          type: number
                        BlockedStdDev:
                          type: number
                        BouncedCount:
                          type: number
                        BouncedStdDev:
                          type: number
                        CampaignAggregateID:
                          type: string
                        ClickedCount:
                          type: number
                        ClickedStdDev:
                          type: number
                        OpenedCount:
                          type: number
                        OpenedStdDev:
                          type: number
                        RefTimestamp:
                          type: string
                        SentCount:
                          type: number
                        SentStdDev:
                          type: number
                        SpamComplaintCount:
                          type: number
                        SpamcomplaintStdDev:
                          type: number
                        UnsubscribedCount:
                          type: number
                        UnsubscribedStdDev:
                          type: number
                      title: aggregategraphstatistics
                  Total:
                    type: integer
                    description: Total number of items available
        '400':
          description: Bad Request - Invalid syntax or parameters
        '401':
          description: Unauthorized - API key is missing or invalid
        '403':
          description: Forbidden - Insufficient permissions
        '404':
          description: aggregategraphstatistics not found
        '429':
          description: Too Many Requests - API rate limit exceeded
        '500':
          description: Internal Server Error
      security:
      - basicAuth: []
