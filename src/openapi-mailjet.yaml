      - name: User
        in: query
        schema:
          type: string
        description: User for which to show API keys.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  Count:
                    type: integer
                    description: Number of items in this response
                  Data:
                    type: array
                    items:
                      type: object
                      properties:
                        ACL:
                          type: string
                        APIKey:
                          type: string
                        CreatedAt:
                          type: string
                        ID:
                          type: integer
                        IsActive:
                          type: boolean
                        IsMaster:
                          type: boolean
                        Name:
                          type: string
                        QuarantineValue:
                          type: string
                        RegionID:
                          type: string
                        Runlevel:
                          type: string
                        SecretKey:
                          type: string
                        TrackHost:
